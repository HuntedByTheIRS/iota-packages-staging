%NAME%
linux-zen

%VERSION%
7.1.3

%SOURCE-DIR%
linux-{VERSION}

%KERNEL-SOURCE%
https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-{VERSION}.tar.xz

%KERNEL_GIT%
false
# When true, %KERNEL-SOURCE% is treated as a git command instead of a tarball URL.
# Example for git mode:
#   %KERNEL_GIT%
#   true
#   %KERNEL-SOURCE%
#   git clone --depth=1 -b v{VERSION} https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git linux-{VERSION}

%IGNORE-KERNEL-SOURCE%
false
# When true, no kernel source is fetched at all. %BUILD%, %PREPARE%, and %INSTALL%
# commands run directly in the temp directory. Useful for custom build scripts.

%EXTERNAL-SOURCES%
https://github.com/zen-kernel/zen-kernel/releases/download/v{VERSION}-zen1/linux-v{VERSION}-zen1.patch.zst

%CONFIG%
defconfig

%MAKEOPTS%
-j2

%PREPARE%
unzstd linux-v{VERSION}-zen1.patch.zst

%PATCH%
linux-v{VERSION}-zen1.patch

%BUILD%
make

%INSTALL-MODULES%
true

%INSTALL%
make install
